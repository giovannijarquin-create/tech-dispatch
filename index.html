/* ------------------------------------------------------------------ *
 *  ROUTING MATH
 * ------------------------------------------------------------------ */

const ROAD_FACTOR = 1.3;
const AVG_MPH = 32;
const DWELL_BASE = 8;
const DWELL_PER_ITEM = 0.6;
const DEPART = 8.5 * 60;

function haversine(a, b) {
  const R = 3958.8;
  const dLat = ((b.lat - a.lat) * Math.PI) / 180;
  const dLng = ((b.lng - a.lng) * Math.PI) / 180;
  const la1 = (a.lat * Math.PI) / 180;
  const la2 = (b.lat * Math.PI) / 180;
  const h =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
const roadMiles = (a, b) => haversine(a, b) * ROAD_FACTOR;

function tourLength(order, returnHome) {
  let total = 0, prev = DEPOT;
  for (const s of order) { total += roadMiles(prev, s); prev = s; }
  if (returnHome && order.length) total += roadMiles(prev, DEPOT);
  return total;
}
function nearestNeighbour(stops) {
  const rem = [...stops], order = [];
  let cur = DEPOT;
  while (rem.length) {
    let bi = 0, bd = Infinity;
    rem.forEach((s, i) => { const d = roadMiles(cur, s); if (d < bd) { bd = d; bi = i; } });
    cur = rem[bi]; order.push(cur); rem.splice(bi, 1);
  }
  return order;
}
function twoOpt(order, returnHome) {
  if (order.length < 4) return order;
  let best = [...order], bestLen = tourLength(best, returnHome);
  let improved = true, guard = 0;
  while (improved && guard < 60) {
    improved = false; guard++;
    for (let i = 0; i < best.length - 1; i++) {
      for (let k = i + 1; k < best.length; k++) {
        const cand = [...best.slice(0, i), ...best.slice(i, k + 1).reverse(), ...best.slice(k + 1)];
        const len = tourLength(cand, returnHome);
        if (len < bestLen - 1e-9) { best = cand; bestLen = len; improved = true; }
      }
    }
  }
  return best;
}
const fmtClock = (mins) => {
  const m = Math.round(mins);
  let h = Math.floor(m / 60);
  const mm = String(m % 60).padStart(2, "0");
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 === 0 ? 12 : h % 12;
  return `${h}:${mm} ${ap}`;
};
const googleUrl = (legStops, returnHome) => {
  const pt = (s) => encodeURIComponent(s.addr ? `${s.addr}, GA` : `${s.lat},${s.lng}`);
  const origin = encodeURIComponent(DEPOT.addr);

  const mid = returnHome ? legStops : legStops.slice(0, -1);

  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${wp ? `&waypoints=${wp}` : ""}&travelmode=driving`;
};

const appleUrl = (legStops, returnHome) => {
  const pt = (s) => encodeURIComponent(s.addr ? `${s.addr}, GA` : `${s.lat},${s.lng}`);
  const saddr = encodeURIComponent(DEPOT.addr);
  const daddrs = legStops.map(pt);
  if (returnHome) daddrs.push(saddr);
  return `https://maps.apple.com/?saddr=${saddr}&daddr=${daddrs.join("+to:")}&dirflg=d`;
};

function CherokeeDispatch() {
  const todayIdx = new Date().getDay();
  const guessDay = [1, 4].includes(todayIdx) ? "Mon/Thu" : "Tue/Fri";

  const [day, setDay] = useState(guessDay);
  const [jobs, setJobs] = useState({});
  const [returnHome, setReturnHome] = useState(true);
  const [mapProvider, setMapProvider] = useState("google");
  const [route, setRoute] = useState(null);

  const dayStops = useMemo(() => STOPS.filter((s) => s.day === day), [day]);
  const chosen = useMemo(
    () => dayStops.filter((s) => jobs[s.id] && s.lat != null),
    [dayStops, jobs]
  );

  const toggle = (s) => {
    if (s.lat == null) return;
    setJobs((j) => {
      const n = { ...j };
      if (n[s.id]) delete n[s.id];
      else n[s.id] = { items: [{ type: DEVICES[0], qty: 1, dir: "drop" }] };
      return n;
    });
    setRoute(null);
  };
  const setItem = (id, i, patch) => {
    setJobs((j) => {
      const items = j[id].items.map((it, k) => (k === i ? { ...it, ...patch } : it));
      return { ...j, [id]: { ...j[id], items } };
    });
    setRoute(null);
  };
  const addItem = (id) => {
    setJobs((j) => ({
      ...j,
      [id]: { ...j[id], items: [...j[id].items, { type: DEVICES[0], qty: 1, dir: "drop" }] },
    }));
    setRoute(null);
  };
  const delItem = (id, i) => {
    setJobs((j) => {
      const items = j[id].items.filter((_, k) => k !== i);
      return { ...j, [id]: { ...j[id], items: items.length ? items : [{ type: DEVICES[0], qty: 1, dir: "drop" }] } };
    });
    setRoute(null);
  };

  const build = () => {
    if (!chosen.length) return;
    const order = twoOpt(nearestNeighbour(chosen), returnHome);
    let clock = DEPART, cum = 0, prev = DEPOT;
    const legs = order.map((s) => {
      const job = jobs[s.id];
      const count = job.items.reduce((a, it) => a + (Number(it.qty) || 0), 0);
      const mi = roadMiles(prev, s);
      cum += mi;
      clock += (mi / AVG_MPH) * 60;
      const eta = clock;
      clock += DWELL_BASE + count * DWELL_PER_ITEM;
      prev = s;
      return { stop: s, job, count, mi, cum, eta };
    });
    let back = null;
    if (returnHome) {
      const mi = roadMiles(prev, DEPOT);
      cum += mi;
      clock += (mi / AVG_MPH) * 60;
      back = { mi, cum, eta: clock };
    }
    setRoute({ legs, back, total: cum, finish: clock });
  };

  const clearAll = () => { setJobs({}); setRoute(null); };

  const load = useMemo(() => {
    const out = {}, back = {};
    chosen.forEach((s) => {
      jobs[s.id].items.forEach((it) => {
        const q = Number(it.qty) || 0;
        if (it.dir === "drop") out[it.type] = (out[it.type] || 0) + q;
        else back[it.type] = (back[it.type] || 0) + q;
      });
    });
    const sum = (o) => Object.values(o).reduce((a, b) => a + b, 0);
    return { out, back, outN: sum(out), backN: sum(back) };
  }, [chosen, jobs]);

  const nUnrouted = dayStops.filter((s) => s.lat == null).length;

  const cap = linkCap(mapProvider, returnHome);
  const chunks = [];
  if (route) {
    for (let i = 0; i < route.legs.length; i += cap)
      chunks.push(route.legs.slice(i, i + cap).map((l) => l.stop));
  }

  return (
    <div className="dsp">
      <style>{CSS}</style>

      <div className="dsp-hd">
        <h1 className="dsp-ttl">Cherokee Tech Dispatch</h1>
        <div className="dsp-sub">DEPART {DEPOT.addr.toUpperCase()} — 8:30 AM</div>
      </div>

      <div className="dsp-grid">
        {/* ---------- LEFT ---------- */}
        <div>
          <div className="dsp-lbl">1 — Which day</div>
          <div className="dsp-days">
            {["Mon/Thu", "Tue/Fri"].map((d) => (
              <button key={d} className="dsp-day" aria-pressed={day === d}
                      onClick={() => { setDay(d); setRoute(null); }}>
                {d}
              </button>
            ))}
          </div>

          <div className="dsp-lbl">2 — Who called in, and what for</div>
          <div className="dsp-tools">
            <button className="dsp-mini" onClick={clearAll}>Clear all</button>
            <label className="dsp-mini" style={{ display: "flex", gap: 7, alignItems: "center" }}>
              <input type="checkbox" checked={returnHome} style={{ width: 17, height: 17 }}
                     onChange={(e) => { setReturnHome(e.target.checked); setRoute(null); }} />
              Return to warehouse
            </label>
          </div>

          {[1, 2, 3].map((b) => {
            const rows = dayStops.filter((s) => s.block === b);
            if (!rows.length) return null;
            return (
              <div key={b}>
                <div className="dsp-blk">— Schedule block {b} —</div>
                {rows.map((s) => {
                  const job = jobs[s.id];
                  return (
                    <div key={s.id} className={`dsp-item${job ? " on" : ""}`}>
                      <label className={`dsp-row${s.lat == null ? " off" : ""}`}>
                        <input type="checkbox" checked={!!job} disabled={s.lat == null}
                               onChange={() => toggle(s)} />
                        <span>
                          <span className="dsp-nm">{s.name}</span>
                          <span className="dsp-ad">
                            {s.addr || "address needed — send it to me and I'll wire it in"}
                          </span>
                          {s.flag && <span className="dsp-warn">{s.flag}</span>}
                        </span>
                      </label>

                      {job && (
                        <div className="dsp-job">
                          {job.items.map((it, i) => (
                            <div className="dsp-iline" key={i}>
                              <div className="dsp-idir">
                                {DIRS.map((d) => (
                                  <button key={d.k} className="dsp-dbtn"
                                          aria-pressed={it.dir === d.k}
                                          style={it.dir === d.k ? { background: d.color } : undefined}
                                          onClick={() => setItem(s.id, i, { dir: d.k })}>
                                    {d.label}
                                  </button>
                                ))}
                              </div>
                              <div className="dsp-line">
                                <select className="dsp-sel" value={it.type}
                                        aria-label="Device type"
                                        onChange={(e) => setItem(s.id, i, { type: e.target.value })}>
                                  {DEVICES.map((d) => <option key={d} value={d}>{d}</option>)}
                                </select>
                                <input className="dsp-qty" type="number" min="1" value={it.qty}
                                       aria-label="Quantity"
                                       onChange={(e) => setItem(s.id, i, { qty: e.target.value })} />
                                <button className="dsp-x" onClick={() => delItem(s.id, i)}
                                        aria-label="Remove this device line">×</button>
                              </div>
                            </div>
                          ))}
                          <button className="dsp-add" onClick={() => addItem(s.id)}>
                            + Add another item
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}

          <button className="dsp-go" onClick={build} disabled={!chosen.length}>
            Build itinerary ({chosen.length})
          </button>
        </div>

        {/* ---------- RIGHT ---------- */}
        <div>
          <div className="dsp-lbl">3 — Your run</div>

          {!route && (
            <div className="dsp-empty">
              Tick the stops that called in, set drop off or pick up, and list the
              devices.<br />I'll order them so you're not doubling back.
            </div>
          )}

          {route && (
            <div className="dsp-card">
              <div className="dsp-stat">
                <div><div className="dsp-sv">{route.legs.length}</div><div className="dsp-sl">Stops</div></div>
                <div><div className="dsp-sv">{route.total.toFixed(1)}</div><div className="dsp-sl">Est. miles</div></div>
                <div><div className="dsp-sv">{fmtClock(route.finish)}</div><div className="dsp-sl">Est. finish</div></div>
              </div>

              <div className="dsp-lbl">Load out / load back</div>
              <div className="dsp-load">
                <span className="dsp-chip" style={{ borderColor: "var(--route)", color: "var(--route)" }}>
                  ↑ {load.outN} out
                </span>
                <span className="dsp-chip" style={{ borderColor: "var(--stop)", color: "var(--stop)" }}>
                  ↓ {load.backN} back
                </span>
                {Object.entries(load.out).map(([t, q]) => (
                  <span className="dsp-chip" key={"o" + t}>{t} ×{q} out</span>
                ))}
                {Object.entries(load.back).map(([t, q]) => (
                  <span className="dsp-chip" key={"b" + t}>{t} ×{q} back</span>
                ))}
              </div>

              <div className="dsp-strip">
                <div className="dsp-leg">
                  <span className="dsp-mi">0.0 mi</span>
                  <span className="dsp-dot home" />
                  <div className="dsp-sn">Tech Warehouse</div>
                  <div className="dsp-meta">
                    Depart 8:30 AM · load {load.outN} item{load.outN === 1 ? "" : "s"}
                  </div>
                </div>

                {route.legs.map((l, i) => {
                  const hasDrop = l.job.items.some((it) => it.dir === "drop");
                  const hasPick = l.job.items.some((it) => it.dir === "pickup");
                  const dotCls = hasDrop && hasPick ? "both" : hasPick ? "pickup" : "";
                  return (
                    <div className="dsp-leg" key={l.stop.id}>
                      <span className="dsp-mi">{l.cum.toFixed(1)} mi</span>
                      <span className={`dsp-dot ${dotCls}`} />
                      <div className="dsp-sn">{i + 1}. {l.stop.name}</div>
                      <div className="dsp-meta">{l.stop.addr}</div>
                      <div className="dsp-eta">Arrive ~{fmtClock(l.eta)} · {l.mi.toFixed(1)} mi leg</div>
                      <div className="dsp-man">
                        {l.job.items.map((it, k) => {
                          const d = DIRS.find((x) => x.k === it.dir);
                          return (
                            <div className="dsp-mline" key={k}>
                              <span>
                                <span className="dsp-itag" style={{ background: d.color }}>{d.short}</span>
                                {it.type}
                              </span>
                              <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600 }}>
                                ×{it.qty}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}

                {route.back && (
                  <div className="dsp-leg">
                    <span className="dsp-mi">{route.back.cum.toFixed(1)} mi</span>
                    <span className="dsp-dot home" />
                    <div className="dsp-sn">Back to warehouse</div>
                    <div className="dsp-eta">
                      ~{fmtClock(route.back.eta)} · returning {load.backN} item{load.backN === 1 ? "" : "s"}
                    </div>
                  </div>
                )}
              </div>

              <div className="dsp-lbl" style={{ marginTop: 14 }}>Open route in</div>
              <div className="dsp-prov">
                {[
                  { k: "google", label: "Google Maps" },
                  { k: "apple", label: "Apple Maps" },
                ].map((p) => (
                  <button key={p.k} className="dsp-pbtn" aria-pressed={mapProvider === p.k}
                          onClick={() => setMapProvider(p.k)}>
                    {p.label}
                  </button>
                ))}
              </div>

              {mapProvider === "google" && route.legs.length > cap && (
                <div className="dsp-hint">
                  {route.legs.length} stops — Google splits this into {chunks.length} links.
                  Apple Maps fits up to 15 per link, so this run would open in{" "}
                  {Math.ceil(route.legs.length / linkCap("apple", returnHome))}.
                </div>
              )}

              {chunks.map((c, i) => {
                const back = returnHome && i === chunks.length - 1;
                const href = mapProvider === "apple" ? appleUrl(c, back) : googleUrl(c, back);
                return (
                  <a key={i} className="dsp-lnk" style={{ marginRight: 8 }}
                     href={href} target="_blank" rel="noreferrer">
                    Open in {mapProvider === "apple" ? "Apple" : "Google"} Maps
                    {chunks.length > 1 ? ` (part ${i + 1} of ${chunks.length})` : ""}
                  </a>
                );
              })}

              <div className="dsp-note">
                Mileage is straight-line × {ROAD_FACTOR} — good for ordering stops, rough
                for predicting your day. Stop time assumes {DWELL_BASE} min to park and
                walk in, plus {DWELL_PER_ITEM} min per device. Adjust once you've driven it.
                Delivery windows still aren't factored in.
              </div>
            </div>
          )}

          {nUnrouted > 0 && (
            <div className="dsp-note">
              {nUnrouted} stop{nUnrouted > 1 ? "s" : ""} on {day} can't be routed yet —
              no address on file. They're greyed out.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<CherokeeDispatch />);
</script>
</body>
</html>
